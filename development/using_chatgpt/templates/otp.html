<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luck Game OTP</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <h1>Email OTP</h1>
      <p class="muted">{{ role.title() }} login for {{ username }}</p>
      {% if error %}<section class="alert error">{{ error }}</section>{% endif %}
      <form method="post" action="/login/otp">
        <input type="hidden" name="otp_token" value="{{ otp_token }}">
        <label>One-time password</label>
        <input name="otp_code" inputmode="numeric" autocomplete="one-time-code" required>
        <button type="submit">Verify OTP</button>
      </form>
    </section>
  </main>
</body>
</html>
