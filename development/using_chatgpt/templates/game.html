<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tin Patti</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="game-page">
  <header class="topbar">
    <div><strong>Tin Patti</strong><span>{{ actor.display_name }} · {{ "%.3f"|format(actor.balance) }} units</span></div>
    <nav><a href="/dashboard">Dashboard</a></nav>
  </header>
  <main class="game-shell">
    {% if error %}<section class="alert error">{{ error }}</section>{% endif %}
    {% if notice %}<section class="alert notice">{{ notice }}</section>{% endif %}
    <section class="game-actions">
      <form method="post" action="/game/betting/open"><button>Open Betting</button></form>
      <form method="post" action="/game/bet"><select name="side"><option>A</option><option>B</option></select><input name="amount" value="10.000"><button>Place Bet</button></form>
      <form method="post" action="/game/start"><button>Start Round</button></form>
      <span id="conn-status">Offline</span>
    </section>
    <section id="banner" class="banner">Connecting...</section>
    <section class="groups">
      <article id="panel-a" class="group-panel"><h2>Group A</h2><div id="cards-a" class="cards-row"></div></article>
      <article id="panel-b" class="group-panel"><h2>Group B</h2><div id="cards-b" class="cards-row"></div></article>
    </section>
    <section id="result" class="result"></section>
    <section><h2>Last 10 Winners</h2><div id="history-track" class="history-track"></div></section>
  </main>
  <script src="/static/game.js"></script>
</body>
</html>
