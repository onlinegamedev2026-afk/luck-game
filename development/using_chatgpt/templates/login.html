<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luck Game Login</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <h1>Luck Game</h1>
      {% if error %}<section class="alert error">{{ error }}</section>{% endif %}
      {% if notice %}<section class="alert notice">{{ notice }}</section>{% endif %}
      <form method="post" action="/login">
        <label>Role</label>
        <select name="role">
          <option value="ADMIN">Admin Login</option>
          <option value="AGENT">Agent Login</option>
          <option value="USER">User Login</option>
        </select>
        <label>Username</label>
        <input name="username" autocomplete="username" required>
        <label>Password</label>
        <input name="password" type="password" autocomplete="current-password" required>
        <div class="captcha-row">
          <label>Captcha: <strong>{{ captcha.question }}</strong></label>
          <button type="button" class="secondary" onclick="window.location.reload()">Refresh Captcha</button>
        </div>
        <input type="hidden" name="captcha_token" value="{{ captcha.token }}">
        <input name="captcha_answer" inputmode="numeric" autocomplete="off" placeholder="Answer" required>
        <p class="muted otp-hint">Admin and Agent login continues with email OTP validation after this step.</p>
        <button type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
